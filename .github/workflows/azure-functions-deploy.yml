# Deploy .NET isolated Azure Function from AdhanFunction/ on push to main.
#
# Setup (one time):
# 1. Azure Portal → your Function App → Get publish profile → download .PublishSettings
# 2. GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#    Name: AZURE_FUNCTIONAPP_PUBLISH_PROFILE
#    Value: paste entire contents of the .PublishSettings file
# 3. GitHub → Settings → Secrets → Actions → add repository secret:
#    AZURE_FUNCTIONAPP_NAME = your Function App name (as shown in Azure Portal)

name: Deploy Azure Function

on:
  push:
    branches:
      - main
    paths:
      - "AdhanFunction/**"
      - ".github/workflows/azure-functions-deploy.yml"

  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish "AdhanFunction/AdhanFunction.csproj" -c Release -o "${{ github.workspace }}/publish"

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: "${{ github.workspace }}/publish"
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
